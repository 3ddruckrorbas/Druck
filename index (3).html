        // --- HELPERS & SERVICES ---

        const generateUUID = () => {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };

        const getDeviceId = () => {
            try {
                let id = localStorage.getItem('rorbas_device_id');
                if (!id) {
                    id = generateUUID();
                    localStorage.setItem('rorbas_device_id', id);
                }
                return id;
            } catch (e) {
                return generateUUID();
            }
        };

        // --- SERVER API SERVICE ---
        
        const API_URL = '/api';

        const ApiService = {
            getOrders: async (deviceId) => {
                const query = deviceId ? `?deviceId=${deviceId}` : '';
                // Add Cache-Control headers to ensure we always get fresh data
                const res = await fetch(`${API_URL}/orders${query}`, {
                    headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
                });
                return await res.json();
            },
            addOrder: async (data, deviceId) => {
                const res = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...data, deviceId })
                });
                return await res.json();
            },
            sendQuestion: async (message) => {
                const res = await fetch(`${API_URL}/questions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                return await res.json();
            },
            updateOrder: async (id, updates) => {
                const res = await fetch(`${API_URL}/orders/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });
                return await res.json();
            },
            deleteOrder: async (id) => {
                const res = await fetch(`${API_URL}/orders/${id}`, { method: 'DELETE' });
                return await res.json();
            },
            
            // Ban Management
            getBanned: async () => {
                try {
                    const res = await fetch(`${API_URL}/banned`);
                    return await res.json();
                } catch(e) { return []; }
            },
            banDevice: async (deviceId) => {
                const res = await fetch(`${API_URL}/banned`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ deviceId })
                });
                return await res.json();
            },
            unbanDevice: async (deviceId) => {
                const res = await fetch(`${API_URL}/banned/${deviceId}`, { method: 'DELETE' });
                return await res.json();
            },
            
            // Filament Routes
            getFilaments: async () => {
                try {
                    const res = await fetch(`${API_URL}/filaments`);
                    return await res.json();
                } catch(e) { return []; }
            },
            addFilament: async (data) => {
                const res = await fetch(`${API_URL}/filaments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await res.json();
            },
            updateFilament: async (id, updates) => {
                const res = await fetch(`${API_URL}/filaments/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });
                return await res.json();
            },
            deleteFilament: async (id) => {
                const res = await fetch(`${API_URL}/filaments/${id}`, { method: 'DELETE' });
                return await res.json();
            },

            // Auth & Settings Routes
            login: async (password, deviceId) => {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ password, deviceId })
                });
                if (!res.ok) throw new Error('Ungültiges Passwort');
                return await res.json();
            },

                 try {

                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });
                });

                    const base64Images = await Promise.all(base64Promises);
                    setNewTemplate(prev => ({ ...prev, images: [...prev.images, ...base64Images] }));

                                    <textarea required className="w-full bg-transparent border-b border-white/10 p-0 py-3 text-white focus:border-gold outline-none transition-all placeholder-white/30" rows="2" value={newTemplate.description} onChange={e=>setNewTemplate({...newTemplate, description: e.target.value})} placeholder="Kurze Beschreibung der Vorlage..." />
                                </div>
                            </div>
                            <Button type="submit" className="w-full" disabled={isUploading}>Kollektion erweitern</Button>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {templates.map(tpl => (

                                <div className="h-48 bg-black/40 overflow-hidden relative">
                                    <img src={tpl.images?.[0] || tpl.imageUrl} alt={tpl.title} className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" referrerPolicy="no-referrer" />

                                        <div className="absolute bottom-3 right-3 bg-black/80 text-gold text-[8px] px-2 py-1 tracking-[0.2em] uppercase backdrop-blur-sm border border-gold/20">
                                            +{tpl.images.length - 1} Assets
                                        </div>

                                </div>
                                <div className="p-6 flex-grow flex flex-col">
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <h4 className="font-serif text-gold text-lg tracking-tight">{tpl.title}</h4>
                                            {tpl.weight && <span className="text-[9px] text-white/40 uppercase tracking-widest">{tpl.weight}g</span>}
                                        </div>
                                        <div className="flex items-center gap-2">
                                            {deletingId === tpl.id ? (
                                                <div className="flex gap-2 animate-fadeIn">
                                                    <button 
                                                        onClick={() => handleDelete(tpl.id)} 
                                                        className="text-red-500 hover:text-red-400 text-[8px] font-bold uppercase tracking-[0.2em] px-2 py-1 bg-red-950/20 border border-red-900/50"
                                                    >
                                                        Löschen
                                                    </button>
                                                    <button 
                                                        onClick={() => setDeletingId(null)} 
                                                        className="text-white/50 hover:text-white text-[8px] uppercase tracking-widest px-2 py-1"
                                                    >
                                                        X
                                                    </button>
                                                </div>
                                            ) : (
                                                <button onClick={() => setDeletingId(tpl.id)} className="text-white/30 hover:text-red-500 transition-colors p-1">
                                                    <Trash2 className="h-3 w-3" />
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                    <p className="text-xs text-white/70 font-light leading-relaxed line-clamp-2 flex-grow">{tpl.description}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // Filament Manager Component
        const FilamentManager = ({ filaments, onChange }) => {
            const [isAdding, setIsAdding] = React.useState(false);
            const [editingId, setEditingId] = React.useState(null);
            const [newFilament, setNewFilament] = React.useState({ name: '', color: '', colorHex: '#000000', material: 'PLA', pricePer100g: '', fixedPriceUnder50g: '' });
            const [editForm, setEditForm] = React.useState({});

            const handleAdd = async (e) => {
                e.preventDefault();
                const res = await ApiService.addFilament(newFilament);
                onChange(res);
                setIsAdding(false);
                setNewFilament({ name: '', color: '', colorHex: '#000000', material: 'PLA', pricePer100g: '', fixedPriceUnder50g: '' });
            };

            const startEdit = (fil) => {
                setEditingId(fil.id);
                setEditForm({ ...fil });
            };

            const handleUpdate = async (e) => {
                e.preventDefault();
                const res = await ApiService.updateFilament(editingId, editForm);
                onChange(res);
                setEditingId(null);
            };

            const toggleStock = async (fil) => {
                const res = await ApiService.updateFilament(fil.id, { inStock: !fil.inStock });
                onChange(res);
            };

            const handleDelete = async (id) => {
                if(confirm("Filament wirklich löschen?")) {
                    const res = await ApiService.deleteFilament(id);
                    onChange(res);
                }
            };

            return (
                <div className="space-y-12">
                    <div className="flex justify-between items-center border-b border-white/5 pb-6">
                        <h3 className="text-xl font-serif text-gold tracking-tight">Material-Archiv</h3>
                        <Button onClick={() => { setIsAdding(!isAdding); setEditingId(null); }} size="sm" variant="secondary" className="gap-2">
                            {isAdding ? <X className="h-3 w-3"/> : <Plus className="h-3 w-3"/>} 
                            {isAdding ? 'Abbrechen' : 'Neu'}
                        </Button>
                    </div>

                    {isAdding && (
                        <form onSubmit={handleAdd} className="bg-black/20 p-8 border border-white/5 animate-fadeIn grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="space-y-2">
                                <label className="text-[10px] uppercase tracking-[0.2em] text-white/70">Bezeichnung</label>
                                <input required className="w-full bg-transparent border-b border-white/10 p-0 py-3 text-white focus:border-gold outline-none transition-all placeholder-white/30" value={newFilament.name} onChange={e=>setNewFilament({...newFilament, name: e.target.value})} placeholder="z.B. PLA Matt Schwarz" />
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] uppercase tracking-[0.2em] text-white/70">Materialtyp</label>
                                <select className="w-full bg-transparent border-b border-white/10 p-0 py-3 text-white focus:border-gold outline-none transition-all appearance-none" value={newFilament.material} onChange={e=>setNewFilament({...newFilament, material: e.target.value})}>
                                    <option value="PLA" className="bg-ebony">PLA</option>
                                    <option value="PETG" className="bg-ebony">PETG</option>
                                    <option value="TPU" className="bg-ebony">TPU</option>
                                </select>
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] uppercase tracking-[0.2em] text-white/70">Farbbezeichnung</label>
                                <input required className="w-full bg-transparent border-b border-white/10 p-0 py-3 text-white focus:border-gold outline-none transition-all placeholder-white/30" value={newFilament.color} onChange={e=>setNewFilament({...newFilament, color: e.target.value})} placeholder="z.B. Midnight Black" />
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] uppercase tracking-[0.2em] text-white/70">Farbwert (HEX)</label>
                                <div className="flex gap-4 items-center">
                                    <input type="color" className="h-8 w-8 bg-transparent border-0 cursor-pointer" value={newFilament.colorHex} onChange={e=>setNewFilament({...newFilament, colorHex: e.target.value})} />
                                    <input className="flex-1 bg-transparent border-b border-white/10 p-0 py-3 text-white font-mono focus:border-gold outline-none transition-all" value={newFilament.colorHex} onChange={e=>setNewFilament({...newFilament, colorHex: e.target.value})} />
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] uppercase tracking-[0.2em] text-white/70">Preis pro 100g (CHF)</label>
                                <input type="number" step="0.01" className="w-full bg-transparent border-b border-white/10 p-0 py-3 text-white focus:border-gold outline-none transition-all placeholder-white/30" value={newFilament.pricePer100g} onChange={e=>setNewFilament({...newFilament, pricePer100g: e.target.value})} placeholder="z.B. 5.50" />
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] uppercase tracking-[0.2em] text-white/70">Fixpreis &lt; 50g (CHF)</label>
                                <input type="number" step="0.01" className="w-full bg-transparent border-b border-white/10 p-0 py-3 text-white focus:border-gold outline-none transition-all placeholder-white/30" value={newFilament.fixedPriceUnder50g} onChange={e=>setNewFilament({...newFilament, fixedPriceUnder50g: e.target.value})} placeholder="z.B. 3.00" />
                            </div>
                            <div className="md:col-span-2 pt-4">
                                <Button type="submit" className="w-full">Material registrieren</Button>
                            </div>
                        </form>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filaments.map(fil => (
                            <div key={fil.id} className={`p-6 border transition-all duration-700 flex flex-col gap-4 ${fil.inStock ? 'bg-black/10 border-white/5' : 'bg-black/5 border-white/5 opacity-40'}`}>
                                {editingId === fil.id ? (
                                    <form onSubmit={handleUpdate} className="space-y-4 animate-fadeIn">
                                        <div className="space-y-2">
                                            <label className="text-[8px] uppercase tracking-widest text-white/40">Bezeichnung</label>
                                            <input required className="w-full bg-transparent border-b border-white/10 p-0 py-1 text-white text-sm focus:border-gold outline-none" value={editForm.name} onChange={e=>setEditForm({...editForm, name: e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-2">
                                                <label className="text-[8px] uppercase tracking-widest text-white/40">Preis/100g</label>
                                                <input type="number" step="0.01" className="w-full bg-transparent border-b border-white/10 p-0 py-1 text-white text-sm focus:border-gold outline-none" value={editForm.pricePer100g} onChange={e=>setEditForm({...editForm, pricePer100g: e.target.value})} />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[8px] uppercase tracking-widest text-white/40">Fix &lt; 50g</label>
                                                <input type="number" step="0.01" className="w-full bg-transparent border-b border-white/10 p-0 py-1 text-white text-sm focus:border-gold outline-none" value={editForm.fixedPriceUnder50g} onChange={e=>setEditForm({...editForm, fixedPriceUnder50g: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="flex gap-2 pt-2">
                                            <Button type="submit" size="xs" className="flex-1">Speichern</Button>
                                            <Button type="button" onClick={() => setEditingId(null)} variant="ghost" size="xs" className="flex-1">Abbrechen</Button>
                                        </div>
                                    </form>
                                ) : (
                                    <>
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 rounded-full border border-white/10 shadow-inner" style={{backgroundColor: fil.colorHex}}></div>
                                                <div>
                                                    <div className="font-serif text-gold tracking-tight">{fil.name}</div>
                                                    <div className="text-[10px] uppercase tracking-widest text-white/60">{fil.material} • {fil.color}</div>
                                                    {(fil.pricePer100g || fil.fixedPriceUnder50g) && (
                                                        <div className="text-[9px] text-white/30 mt-1 flex gap-2">
                                                            {fil.pricePer100g && <span>{fil.pricePer100g} CHF/100g</span>}
                                                            {fil.fixedPriceUnder50g && <span>Fix: {fil.fixedPriceUnder50g} CHF</span>}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-1">
                                                <button onClick={() => toggleStock(fil)} className={`p-1.5 transition-colors ${fil.inStock ? 'text-gold hover:text-white' : 'text-white/30 hover:text-gold'}`} title={fil.inStock ? "Auf Lager" : "Ausverkauft"}>
                                                    <CheckCircle2 className="h-3.5 w-3.5" />
                                                </button>
                                                <button onClick={() => startEdit(fil)} className="p-1.5 text-white/30 hover:text-gold transition-colors">
                                                    <Edit className="h-3.5 w-3.5" />
                                                </button>
                                                <button onClick={() => handleDelete(fil.id)} className="p-1.5 text-white/30 hover:text-red-500 transition-colors">
                                                    <Trash2 className="h-3.5 w-3.5" />
                                                </button>
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // Ban Manager Component
        const BanManager = () => {
            const [bannedIds, setBannedIds] = React.useState([]);
            const [newId, setNewId] = React.useState('');
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState('');

            const fetchBanned = async () => {
                setLoading(true);
                try {
                    const data = await ApiService.getBanned();
                    setBannedIds(data);
                } catch (err) {
                    setError("Fehler beim Laden der Sperrliste.");
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => {
                fetchBanned();
            }, []);

            const handleBan = async (e) => {
                e.preventDefault();
                if (!newId.trim()) return;
                try {
                    await ApiService.banDevice(newId.trim());
                    setNewId('');
                    fetchBanned();
                } catch (err) {
                    setError("Fehler beim Sperren.");
                }
            };

            const handleUnban = async (id) => {
                try {
                    await ApiService.unbanDevice(id);
                    fetchBanned();
                } catch (err) {
                    setError("Fehler beim Aufheben der Sperre.");
                }
            };

            return (
                <div className="space-y-8">
                    <div>
                        <h3 className="text-2xl font-serif text-gold mb-2">Geräte-Sperrliste</h3>
                        <p className="text-sm text-white/60 font-light tracking-wide">Gesperrte Geräte sehen nur noch den Block-Screen und können keine Anfragen mehr senden.</p>
                    </div>
                    
                    <form onSubmit={handleBan} className="flex gap-4">
                        <input 
                            className="flex-1 bg-transparent border-b border-white/10 p-2 text-white text-sm font-mono focus:border-gold outline-none transition-colors" 
                            placeholder="Device ID eingeben..." 
                            value={newId}
                            onChange={e => setNewId(e.target.value)}
                        />
                        <Button type="submit" size="sm" variant="danger">Sperren</Button>
                    </form>

                    {error && <div className="text-red-400 text-xs font-light">{error}</div>}

                    <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                        {loading ? (
                            <div className="text-center py-12"><RefreshCw className="h-8 w-8 animate-spin text-gold/20 mx-auto" /></div>
                        ) : bannedIds.length === 0 ? (
                            <div className="text-center py-12 text-white/50 text-sm font-light italic">Keine gesperrten Geräte.</div>
                        ) : (
                            bannedIds.map(id => (
                                <div key={id} className="flex items-center justify-between p-4 bg-black/20 rounded-xl border border-white/5 hover:border-gold/20 transition-all group">
                                    <span className="text-xs font-mono text-white/80 truncate mr-4 tracking-wider">{id}</span>
                                    <button onClick={() => handleUnban(id)} className="text-white/50 hover:text-gold transition-colors">
                                        <CheckCircle2 className="h-5 w-5" />
                                    </button>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };

        // Password Manager Component
        const PasswordManager = () => {
            const [passwords, setPasswords] = React.useState([]);
            const [newPassword, setNewPassword] = React.useState('');
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState('');

            const loadPasswords = async () => {
                const data = await ApiService.getPasswords();
                setPasswords(data);
                setLoading(false);
            };

            React.useEffect(() => {
                loadPasswords();
            }, []);

            const handleAdd = async (e) => {
                e.preventDefault();
                if(!newPassword.trim()) return;
                const updated = await ApiService.addPassword(newPassword);
                setPasswords(updated);
                setNewPassword('');
            };

            const handleDelete = async (pwd) => {
                if(confirm('Passwort wirklich löschen?')) {
                    try {
                        const updated = await ApiService.deletePassword(pwd);
                        setPasswords(updated);
                        setError('');
                    } catch(e) {
                        setError(e.message);
                    }
                }
            };

            return (
                 <div className="space-y-8">
                    <div>
                        <h3 className="text-2xl font-serif text-gold mb-2 flex items-center gap-3">
                            <Key className="h-6 w-6 opacity-50"/> Admin Zugangsdaten
                        </h3>
                        <p className="text-white/80 text-sm font-light tracking-wide">Hier können zusätzliche Passwörter für den Admin-Login hinterlegt werden. Diese werden sicher auf dem Server gespeichert.</p>
                    </div>
                    
                    {error && <div className="p-4 bg-red-900/20 border border-red-500/20 rounded-xl text-red-300 text-sm font-light">{error}</div>}

                    <form onSubmit={handleAdd} className="flex gap-4">
                        <input 
                            type="text" 
                            className="flex-1 bg-transparent border-b border-white/10 p-2 text-white focus:border-gold outline-none transition-colors placeholder-white/30" 
                            placeholder="Neues Passwort..." 
                            value={newPassword}
                            onChange={e => setNewPassword(e.target.value)}
                        />
                        <Button type="submit" size="sm" className="whitespace-nowrap">Hinzufügen</Button>
                    </form>

                    <div className="bg-black/20 rounded-2xl border border-white/5 overflow-hidden">
                        {loading ? <div className="p-12 text-center text-white/50 italic font-light">Lade...</div> : (
                            <ul className="divide-y divide-white/5">
                                {passwords.map((pwd, idx) => (
                                    <li key={idx} className="p-5 flex items-center justify-between hover:bg-white/5 transition-colors group">
                                        <div className="font-mono text-white/80 tracking-wider">{pwd}</div>
                                        <button onClick={() => handleDelete(pwd)} className="text-white/50 hover:text-red-400 transition-colors p-1" title="Löschen">
                                            <Trash2 className="h-5 w-5" />
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        )}
                    </div>
                </div>
            );
        };


        // Admin Dashboard
        const AdminDashboard = ({ currentUser, onLogout }) => {
            const [orders, setOrders] = React.useState([]);
            const [filaments, setFilaments] = React.useState([]);
            const [templates, setTemplates] = React.useState([]);
            const [editingId, setEditingId] = React.useState(null);
            const [editForm, setEditForm] = React.useState({});
            const [loading, setLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('orders'); // 'orders', 'filaments', 'templates', 'settings'

            const loadData = () => {
                setLoading(true);
                Promise.all([
                    ApiService.getOrders(),
                    ApiService.getFilaments(),
                    ApiService.getTemplates()
                ]).then(([ordersData, filamentsData, templatesData]) => {
                    setOrders(ordersData);
                    setFilaments(filamentsData);
                    setTemplates(templatesData);
                    setLoading(false);
                });
            }

            React.useEffect(() => {
                loadData();
            }, []);

            const handleDeleteOrder = (id) => {
                if(confirm("Bestellung wirklich vom Server löschen?")) {
                    ApiService.deleteOrder(id).then(data => setOrders(data));
                }
            };

            const startEditOrder = (order) => {
                setEditingId(order.id);
                setEditForm({ status: order.status, adminNotes: order.adminNotes || '' });
            };

            const saveEditOrder = (id) => {
                ApiService.updateOrder(id, editForm).then(data => {
                    setOrders(data);
                    setEditingId(null);
                });
            };

            return (
                <div className="max-w-6xl mx-auto py-12 px-4 animate-fadeIn">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row justify-between items-center mb-12 bg-black/40 p-8 rounded-3xl border border-white/5 shadow-2xl backdrop-blur-xl">
                        <div className="flex items-center gap-6 mb-6 md:mb-0">
                            <div className="w-14 h-14 bg-gold rounded-2xl flex items-center justify-center text-ebony font-serif text-2xl shadow-lg shadow-gold/20">A</div>
                            <div>
                                <h1 className="text-3xl font-serif text-gold tracking-tight">Admin Kommandozentrale</h1>
                                <div className="flex items-center gap-2 text-sm">
                                    <span className="flex h-2 w-2 relative"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-gold opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-gold"></span></span>
                                    <span className="text-gold font-light tracking-widest uppercase text-[10px]">System Aktiv</span>
                                    <span className="text-white/10 mx-2">|</span>
                                    <span className="text-white/70 font-light">{currentUser}</span>
                                </div>
                            </div>
                        </div>
                        <Button onClick={onLogout} variant="ghost" size="sm" className="text-white/70 hover:text-white">Abmelden</Button>
                    </div>

                    {/* Tabs */}
                    <div className="flex gap-8 mb-8 border-b border-white/5 pb-1 overflow-x-auto no-scrollbar">
                        {[
                            { id: 'orders', label: 'Bestellungen' },
                            { id: 'filaments', label: 'Materialien' },
                            { id: 'templates', label: 'Vorlagen' },
                            { id: 'ban', label: 'Sperrliste' },
                            { id: 'settings', label: 'Einstellungen' }
                        ].map(tab => (
                            <button 
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)} 
                                className={`px-2 py-4 font-light text-sm transition-all whitespace-nowrap relative tracking-widest uppercase ${activeTab === tab.id ? 'text-gold' : 'text-white/70 hover:text-white'}`}
                            >
                                {tab.label}
                                {activeTab === tab.id && <motion.div layoutId="activeTab" className="absolute bottom-[-1px] left-0 w-full h-0.5 bg-gold" />}
                            </button>
                        ))}
                    </div>

                    <div className="bg-black/20 border border-white/5 rounded-3xl p-8 backdrop-blur-sm">
                        {loading && activeTab !== 'settings' ? (
                             <div className="flex justify-center py-24"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-gold/20"></div></div>
                        ) : activeTab === 'filaments' ? (
                            <FilamentManager filaments={filaments} onChange={setFilaments} />
                        ) : activeTab === 'templates' ? (
                            <TemplateManager templates={templates} onChange={setTemplates} />
                        ) : activeTab === 'ban' ? (
                            <BanManager />
                        ) : activeTab === 'settings' ? (
                            <PasswordManager />
                        ) : (
                            // ORDERS TAB
                            <div className="space-y-8">
                                <div className="flex items-center justify-between">
                                    <h2 className="text-2xl font-serif text-gold flex items-center gap-3">
                                        <ServerIcon className="h-6 w-6 opacity-50"/> Bestellungen
                                    </h2>
                                    <Button onClick={loadData} variant="secondary" size="sm" className="gap-2">
                                        <RefreshCw className={`h-4 w-4 ${loading ? 'animate-spin' : ''}`} /> Aktualisieren
                                    </Button>
                                </div>
                                <div className="grid gap-6">
                                    {orders.length === 0 ? (
                                        <div className="text-center text-white/20 py-24 bg-black/10 rounded-3xl border border-white/5 border-dashed">
                                            <p className="font-light italic">Keine Bestellungen vorhanden.</p>
                                        </div>
                                    ) : (
                                        orders.map(order => (
                                            <div key={order.id} className="bg-black/20 border border-white/5 rounded-2xl p-6 shadow-sm hover:border-gold/20 transition-all group">
                                                {editingId === order.id ? (
                                                    <div className="space-y-6 animate-fadeIn bg-black/40 p-6 rounded-xl border border-white/5">
                                                        <div className="flex justify-between items-center border-b border-white/5 pb-4">
                                                            <h3 className="font-serif text-gold">Bestellung bearbeiten</h3>
                                                            <Button onClick={() => setEditingId(null)} variant="ghost" size="sm"><X className="h-4 w-4"/></Button>
                                                        </div>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                            <div>
                                                                <label className="block text-[10px] uppercase tracking-widest text-white/40 mb-2">Status</label>

                                    onClick={() => { onNavigate(ViewState.ABOUT_US); setIsOpen(false); }}

                                    <Button

                                        Jetzt starten

                                </div>
                                <button
                                    onClick={() => { onNavigate(ViewState.AGB); setIsOpen(false); }}
                                    className="text-white/20 hover:text-gold block px-3 py-2 text-[8px] uppercase tracking-[0.3em] w-full text-left border-t border-white/5 mt-4"
                                >
                                    AGB & Rechtliches
                                </button>
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        // Hero Component
        const Hero = ({ onStart, onNavigate }) => {
            const [activeFeature, setActiveFeature] = React.useState(null);

            const features = [
                {
                    icon: <Box className="h-6 w-6 text-gold" />,
                    title: "Individuell",
                    desc: "Jedes Teil wird genau nach deinen Wünschen gefertigt.",
                    details: "Egal ob eine fertige STL-Datei oder nur eine grobe Skizze: Wir beraten dich zur Machbarkeit. Wir passen Füllung, Wandstärke und Auflösung genau an den Verwendungszweck an."
                },
                {
                    icon: <Zap className="h-6 w-6 text-gold" />,
                    title: "Schnell & Lokal",
                    desc: "Direkt aus Rorbas. Keine langen Lieferwege.",
                    details: "Wir produzieren vor Ort in Rorbas. Das spart Versandzeit und schont die Umwelt. Du kannst deine Drucke oft schon nach wenigen Tagen direkt abholen."
                },
                {
                    icon: <Heart className="h-6 w-6 text-gold" />,
                    title: "Leidenschaft",
                    desc: "Gedruckt von Enthusiasten, die Qualität lieben.",
                    details: "Wir sind keine industrielle Massenfertigung. Jedes Teil wird von uns persönlich begutachtet. Wenn die Qualität nicht stimmt, drucken wir es neu."

            return (
                <div className="relative pt-32 pb-24 lg:pt-48 lg:pb-32 overflow-hidden">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">

                            <div className="inline-flex items-center gap-3 px-4 py-2 rounded-full bg-gold/5 border border-gold/20 text-gold text-[10px] uppercase tracking-[0.4em] font-bold mb-12 animate-fadeIn">
                                <span className="relative flex h-2 w-2">
                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-gold opacity-75"></span>

                                    onClick={() => document.getElementById('how-it-works')?.scrollIntoView({ behavior: 'smooth'})}

                                </button>

                        </div>
                        
                        <div className="mt-32 grid grid-cols-1 md:grid-cols-3 gap-12">
                            {features.map((feature, idx) => (
                                <div 
                                    key={idx} 
                                    onClick={() => setActiveFeature(activeFeature === idx ? null : idx)}
                                    className={`relative p-10 border transition-all duration-700 cursor-pointer group overflow-hidden ${
                                        activeFeature === idx 
                                        ? 'bg-gold/5 border-gold shadow-[0_0_50px_rgba(197,160,89,0.1)]' 
                                        : 'bg-white/[0.02] border-white/5 hover:border-gold/30'
                                    }`}
                                >
                                    <div className="flex justify-between items-start mb-8">
                                        <div className={`p-4 rounded-full transition-all duration-700 ${activeFeature === idx ? 'bg-gold text-ebony' : 'bg-white/5 text-gold'}`}>
                                            {feature.icon}
                                        </div>
                                        <div className={`transition-transform duration-700 text-white/50 ${activeFeature === idx ? 'rotate-180 text-gold' : 'group-hover:text-white/70'}`}>
                                            <ChevronDown className="h-5 w-5" />
                                        </div>
                                    </div>
                                    <h3 className={`text-2xl font-serif mb-4 transition-colors duration-700 ${activeFeature === idx ? 'text-gold' : 'text-white'}`}>{feature.title}</h3>
                                    <div className="relative">
                                        <p className={`text-sm text-white/70 font-light leading-relaxed transition-all duration-700 ${activeFeature === idx ? 'opacity-0 h-0' : 'opacity-100'}`}>{feature.desc}</p>
                                        <p className={`text-sm text-white/80 font-light leading-relaxed transition-all duration-700 ${activeFeature === idx ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-4 absolute top-0 left-0 pointer-events-none'}`}>{feature.details}</p>
                                    </div>
                                    <div className={`mt-6 text-[8px] font-bold text-gold uppercase tracking-[0.3em] transition-opacity duration-700 ${activeFeature === idx ? 'opacity-0 h-0' : 'opacity-100'}`}>Details</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full -z-10 pointer-events-none">
                        <div className="absolute top-0 left-1/4 w-[500px] h-[500px] bg-gold/5 rounded-full blur-[120px]"></div>
                        <div className="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-white/5 rounded-full blur-[120px]"></div>
                    </div>
                </div>
            );
        };

        // HowItWorks Component
        const HowItWorks = () => {
             return (
                <section id="how-it-works" className="py-32 bg-ebony relative overflow-hidden">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                        <div className="text-center mb-24">
                            <h2 className="text-4xl md:text-5xl font-serif text-white mb-6 tracking-tight">Der Weg zum <span className="text-gold">Unikat</span></h2>
                            <p className="text-white/70 font-light tracking-widest uppercase text-[10px]">In drei exklusiven Schritten</p>
                        </div>
                        <div className="relative">
                            <div className="hidden md:block absolute top-1/2 left-0 w-full h-px bg-white/5 -translate-y-1/2 z-0"></div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-16 relative z-10">
                                {[
                                    { icon: <ClipboardList className="h-8 w-8" />, title: "Anfrage", desc: "Übermittle uns deine Vision oder wähle aus unserer kuratierten Kollektion." },
                                    { icon: <Settings className="h-8 w-8" />, title: "Präzision", desc: "Enrique und Jack optimieren jedes Detail für den perfekten Druck." },
                                    { icon: <Truck className="h-8 w-8" />, title: "Vollendung", desc: "Dein Objekt wird sorgfältig verpackt und ist bereit für dich." }
                                ].map((step, idx) => (
                                    <div key={idx} className="flex flex-col items-center text-center group">
                                        <div className="w-24 h-24 rounded-full bg-ebony border border-white/10 flex items-center justify-center mb-10 shadow-2xl relative transition-all duration-700 group-hover:border-gold/50 group-hover:shadow-gold/5">
                                            <div className="text-gold transition-transform duration-700 group-hover:scale-110">{step.icon}</div>
                                            <div className="absolute -bottom-4 bg-gold text-ebony text-[8px] font-bold px-3 py-1 uppercase tracking-widest">Phase {idx + 1}</div>
                                        </div>
                                        <h3 className="text-2xl font-serif text-white mb-4 transition-colors duration-700 group-hover:text-gold">{step.title}</h3>
                                        <p className="text-white/40 text-sm font-light leading-relaxed max-w-xs">{step.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // Footer Component
        const Footer = ({ onNavigate }) => {
            return (
                <footer className="bg-ebony py-24 border-t border-white/5 text-white/40 relative overflow-hidden">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-16">
                            <div className="col-span-1 md:col-span-2">
                                <h3 className="text-white font-serif text-2xl mb-6">Rorbas<span className="text-gold">3D</span></h3>
                                <p className="mb-8 text-sm font-light leading-relaxed max-w-sm">
                                    Wir verwandeln digitale Träume in greifbare Realität. Lokal, präzise und mit einem Auge für das Außergewöhnliche.
                                </p>
                                <div className="flex gap-6">
                                    <div className="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center hover:border-gold hover:text-gold transition-all cursor-pointer">
                                        <Zap className="h-4 w-4" />
                                    </div>
                                    <div className="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center hover:border-gold hover:text-gold transition-all cursor-pointer">
                                        <Heart className="h-4 w-4" />
                                    </div>
                                </div>
                            </div>
                            <div>
                                <h3 className="text-gold text-[10px] uppercase tracking-[0.3em] font-bold mb-8">Navigation</h3>
                                <ul className="space-y-4 text-xs font-light tracking-widest uppercase">
                                    <li><button onClick={() => onNavigate(ViewState.HOME)} className="hover:text-gold transition-colors">Home</button></li>
                                    <li><button onClick={() => onNavigate(ViewState.ABOUT_US)} className="hover:text-gold transition-colors">Über uns</button></li>
                                    <li><button onClick={() => onNavigate(ViewState.ORDER)} className="hover:text-gold transition-colors">Projekt Starten</button></li>
                                    <li><button onClick={() => onNavigate(ViewState.MY_ORDERS)} className="hover:text-gold transition-colors">Bestellungen</button></li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="text-gold text-[10px] uppercase tracking-[0.3em] font-bold mb-8">Kontakt</h3>
                                <div className="space-y-6 text-xs font-light tracking-widest uppercase">
                                    <a href={`mailto:${EMAIL_RECIPIENT}`} className="flex items-center gap-4 hover:text-gold transition-colors">
                                        <Mail className="h-4 w-4 text-gold/70" /> {EMAIL_RECIPIENT}
                                    </a>
                                    <div className="flex items-center gap-4">
                                        <MapPin className="h-4 w-4 text-gold/70" /> Rorbas, Schweiz
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="mt-24 pt-12 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-8 text-[8px] uppercase tracking-[0.4em] text-white/50">
                            <div>&copy; {new Date().getFullYear()} Rorbas 3D Druck. Alle Rechte vorbehalten.</div>
                            <div className="flex gap-12">
                                <button onClick={() => onNavigate(ViewState.AGB)} className="hover:text-gold transition-colors">AGB & Datenschutz</button>
                                <button onClick={() => onNavigate(ViewState.ADMIN_LOGIN)} className="opacity-10 hover:opacity-100 transition-opacity p-2">
                                    <Lock className="h-2 w-2" />
                                </button>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };

        // Main App Component
        const App = () => {
            const [view, setView] = React.useState(ViewState.HOME);
            const [deviceId, setDeviceId] = React.useState('');
            const [hasOrders, setHasOrders] = React.useState(false);
            const [currentUser, setCurrentUser] = React.useState(null);
            const [filaments, setFilaments] = React.useState([]);
            const [templates, setTemplates] = React.useState([]);

            // Fetch initial data
            React.useEffect(() => {
                const id = getDeviceId();
                setDeviceId(id);
                
                // Check if banned from server
                ApiService.getBanned().then(bannedIds => {
                    if (bannedIds.includes(id)) {
                        setView(ViewState.BANNED);
                    } else {
                        ApiService.getOrders(id).then(orders => setHasOrders(orders.length > 0));
                    }
                });

                // Always fetch filaments
                ApiService.getFilaments().then(setFilaments);
                // Fetch templates
                ApiService.getTemplates().then(setTemplates);
            }, []);

            const handleStartOrder = () => {
                setView(ViewState.ORDER);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleOrderSuccess = () => {
                // Update state immediately without reload
                setHasOrders(true);
                setView(ViewState.SUCCESS);
                // Background refresh to ensure sync
                ApiService.getOrders(deviceId).then(orders => setHasOrders(orders.length > 0));
            };
            
            const handleAdminLogin = (user) => {
                setCurrentUser(user);
                setView(ViewState.ADMIN_DASHBOARD);
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setView(ViewState.HOME);
            };

            if (view === ViewState.BANNED) {
                return <BannedScreen />;
            }

            return (
                <div className="min-h-screen bg-ebony flex flex-col font-sans">
                    {/* Navbar hides on Admin Dashboard or Banned to focus view */}
                    {view !== ViewState.ADMIN_DASHBOARD && view !== ViewState.ADMIN_LOGIN && view !== ViewState.BANNED && (
                        <Navbar currentView={view} onNavigate={setView} hasOrders={hasOrders} />
                    )}
                    
                    <main className="flex-grow pt-16">
                        {view === ViewState.HOME && (
                            <div className="animate-fadeIn">
                                <Hero onStart={handleStartOrder} onNavigate={setView} />
                                <HowItWorks />
                            </div>
                        )}

                        {view === ViewState.ORDER && (
                            <div className="animate-slideUp">
                                <OrderForm 
                                    onCancel={() => setView(ViewState.HOME)} 
                                    onSubmitSuccess={handleOrderSuccess}
                                    deviceId={deviceId}
                                    stockFilaments={filaments}
                                    templates={templates}
                                    onNavigate={setView}
                                />
                            </div>
                        )}

                        {view === ViewState.SUCCESS && (
                            <div className="min-h-[60vh] flex items-center justify-center px-4 animate-scaleIn">
                                <div className="text-center max-w-lg mx-auto p-12 bg-white/[0.02] border border-gold/20 relative overflow-hidden backdrop-blur-xl shadow-2xl">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-gold to-transparent opacity-50" />
                                    <div className="w-24 h-24 bg-gold/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-gold/20">
                                        <Sparkles className="h-10 w-10 text-gold" />
                                    </div>
                                    <h2 className="text-4xl font-serif text-white mb-6 tracking-tight">Anfrage <span className="text-gold">übermittelt</span></h2>
                                    <p className="text-white/60 mb-12 font-light leading-relaxed tracking-wide">Vielen Dank für dein Vertrauen. Wir haben deine Anfrage erhalten und werden diese mit höchster Sorgfalt prüfen. Du findest alle Details in deinem persönlichen Verlauf.</p>
                                    <div className="flex flex-col gap-4">
                                        <Button onClick={() => setView(ViewState.MY_ORDERS)} variant="primary" size="lg">Meine Bestellung ansehen</Button>
                                        <Button onClick={() => setView(ViewState.HOME)} variant="ghost">Zurück zur Startseite</Button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === ViewState.AGB && <AGBView onBack={() => setView(ViewState.HOME)} />}

                        {view === ViewState.ABOUT_US && <AboutUsView onBack={() => setView(ViewState.HOME)} />}

                        {view === ViewState.MY_ORDERS && (
                            <MyOrdersView deviceId={deviceId} onBack={() => setView(ViewState.HOME)} />
                        )}

                        {view === ViewState.ADMIN_LOGIN && (
                            <AdminLoginView onLogin={handleAdminLogin} onBack={() => setView(ViewState.HOME)} />
                        )}

                        {view === ViewState.ADMIN_DASHBOARD && (
                            <AdminDashboard currentUser={currentUser} onLogout={handleLogout} />
                        )}

                        {view === ViewState.BANNED && <BannedScreen />}
                    </main>

                    {view !== ViewState.ADMIN_DASHBOARD && view !== ViewState.ADMIN_LOGIN && view !== ViewState.BANNED && (
                        <Footer onNavigate={setView} />
                    )}
                </div>
            );
        };

        // Render Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
